name: Issue — Branch & Coder Workspace

on:
  issues:
    types: [opened, reopened, closed]

jobs:
  manage:
    name: Manage Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the new branch
      issues: write    # needed to post metadata comments

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Derive branch name (all actions) ────────────────────────────────
      - name: Derive branch name
        id: branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '-' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)
          echo "name=issue/${{ github.event.issue.number }}-${SLUG}" >> "$GITHUB_OUTPUT"

      # ── 3. Create branch (opened only) ─────────────────────────────────────
      - name: Create issue branch
        if: github.event.action == 'opened'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "Created branch: ${{ steps.branch.outputs.name }}"

      # ── 4. Resolve model config ID from labels (opened / reopened) ─────────
      - name: Resolve AI model config
        if: github.event.action != 'closed'
        id: model
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        run: |
          IS_HARD=$(echo "$LABELS_JSON" \
            | jq -r '[.[].name | ascii_downcase] | any(. == "hard") | tostring')
          if [ "$IS_HARD" = "true" ]; then
            echo "config_id=${{ secrets.CODER_MODEL_SENIOR_ID }}" >> "$GITHUB_OUTPUT"
            echo "label=senior" >> "$GITHUB_OUTPUT"
            echo "Label 'hard' detected → senior-coder model config"
          else
            echo "config_id=${{ secrets.CODER_MODEL_JUNIOR_ID }}" >> "$GITHUB_OUTPUT"
            echo "label=junior" >> "$GITHUB_OUTPUT"
            echo "No 'hard' label → junior-coder model config"
          fi

      # ── 5. Resolve template name → UUID + org ID (opened / reopened) ───────
      - name: Resolve Coder template
        if: github.event.action != 'closed'
        id: template
        env:
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          TEMPLATE_NAME="${{ secrets.CODER_TEMPLATE_NAME }}"

          # If the value already looks like a UUID, we still need the org — skip lookup only if org is also provided.
          if echo "$TEMPLATE_NAME" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "id=$TEMPLATE_NAME" >> "$GITHUB_OUTPUT"
            echo "org_id=${{ secrets.CODER_ORG_ID }}" >> "$GITHUB_OUTPUT"
            echo "Template ID (UUID passed directly)"
            exit 0
          fi

          # Look up by name — response is an array.
          HTTP_STATUS=$(curl -s \
            -o /tmp/template_response.json \
            -w "%{http_code}" \
            "${{ secrets.CODER_URL }}/api/v2/organizations/default/templates/$TEMPLATE_NAME" \
            -H "Coder-Session-Token: $CODER_TOKEN")

          echo "Template lookup (HTTP $HTTP_STATUS):"
          cat /tmp/template_response.json | jq . || cat /tmp/template_response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Could not resolve template '$TEMPLATE_NAME' (HTTP $HTTP_STATUS)"
            exit 1
          fi

          TEMPLATE_ID=$(jq -r '.[0].id'              /tmp/template_response.json)
          ORG_ID=$(jq -r      '.[0].organization_id' /tmp/template_response.json)
          echo "id=$TEMPLATE_ID"   >> "$GITHUB_OUTPUT"
          echo "org_id=$ORG_ID"   >> "$GITHUB_OUTPUT"
          echo "Resolved: $TEMPLATE_NAME → $TEMPLATE_ID (org: $ORG_ID)"

      # ── 6. Send task to Coder agent (opened / reopened) ───────────────────
      - name: Send task to Coder agent
        if: github.event.action != 'closed'
        id: chat
        env:
          TASK_PROMPT: ${{ github.event.issue.body }}
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          PROMPT_TEXT="Please create a workspace with the following configuration and work on the task below.
          Workspace configuration:
          - template_id: ${{ steps.template.outputs.id }}
          - workspace_name: issue-${{ github.event.issue.number }}
          - node_version: 22

          "rich_parameter_values": [
            {
              "name": "git_branch",
              "value": "${{ steps.branch.outputs.name }}"
            },
            {
              "name": "git_repo",
              "value": "https://github.com/${{ github.repository }}"
            }
          ],

          Workspace Task:
          /home/coder/project
          NOTE: Please cd to /home/coder/project before starting the task.

          Task:
          $TASK_PROMPT"

          PAYLOAD=$(jq -n \
            --arg org_id   "${{ steps.template.outputs.org_id }}" \
            --arg model_id "${{ steps.model.outputs.config_id }}" \
            --arg prompt   "$PROMPT_TEXT" \
            '{
              client_type:     "api",
              organization_id: $org_id,
              content: [
                { type: "text", text: $prompt }
              ]
            } + (if $model_id != "" then { model_config_id: $model_id } else {} end)')

          HTTP_STATUS=$(curl -s \
            -o /tmp/chat_response.json \
            -w "%{http_code}" \
            -X POST "${{ secrets.CODER_URL }}/api/experimental/chats" \
            -H "Coder-Session-Token: $CODER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Chat response (HTTP $HTTP_STATUS):"
          cat /tmp/chat_response.json | jq . || cat /tmp/chat_response.json

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Failed to send task to Coder agent (HTTP $HTTP_STATUS)"
            exit 1
          fi

          CHAT_ID=$(jq -r '.id // empty' /tmp/chat_response.json)
          echo "chat_id=$CHAT_ID" >> "$GITHUB_OUTPUT"
          echo "Task sent to Coder agent for issue #${{ github.event.issue.number }} (chat: $CHAT_ID)"

      # ── 7. Post metadata comment on the issue (opened / reopened) ───────────
      - name: Post agent metadata to issue
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHAT_ID="${{ steps.chat.outputs.chat_id }}"
          WORKSPACE_NAME="issue-${{ github.event.issue.number }}"
          BRANCH="${{ steps.branch.outputs.name }}"
          MODEL_LABEL="${{ steps.model.outputs.label }}"
          WORKSPACE_URL="${{ secrets.CODER_URL }}/@me/$WORKSPACE_NAME"

          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## Agent Workspace

          | Key | Value |
          |-----|-------|
          | **Chat ID** | \`$CHAT_ID\` |
          | **Workspace** | [\`$WORKSPACE_NAME\`]($WORKSPACE_URL) |
          | **Branch** | \`$BRANCH\` |
          | **Model tier** | $MODEL_LABEL |

          <!-- agent-metadata
          chat_id: $CHAT_ID
          workspace_name: $WORKSPACE_NAME
          workspace_url: $WORKSPACE_URL
          branch: $BRANCH
          model: $MODEL_LABEL
          issue: ${{ github.event.issue.number }}
          -->
          EOF
          )"

      # ── 8. Delete Coder workspace (closed) ─────────────────────────────────
      - name: Delete Coder workspace
        if: github.event.action == 'closed'
        id: delete
        env:
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKSPACE_NAME="issue-${{ github.event.issue.number }}"

          HTTP_STATUS=$(curl -s \
            -o /tmp/ws_list.json \
            -w "%{http_code}" \
            "${{ secrets.CODER_URL }}/api/v2/workspaces?owner=me&name=$WORKSPACE_NAME" \
            -H "Coder-Session-Token: $CODER_TOKEN")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::warning::Could not list workspaces (HTTP $HTTP_STATUS) — skipping delete"
            cat /tmp/ws_list.json
            exit 0
          fi

          WORKSPACE_ID=$(jq -r '.workspaces[0].id // empty' /tmp/ws_list.json)

          if [ -z "$WORKSPACE_ID" ]; then
            echo "No workspace named '$WORKSPACE_NAME' found — nothing to delete."
            exit 0
          fi

          echo "workspace_id=$WORKSPACE_ID" >> "$GITHUB_OUTPUT"
          echo "Deleting workspace $WORKSPACE_NAME ($WORKSPACE_ID)..."

          HTTP_STATUS=$(curl -s \
            -o /tmp/delete_response.json \
            -w "%{http_code}" \
            -X POST "${{ secrets.CODER_URL }}/api/v2/workspaces/$WORKSPACE_ID/builds" \
            -H "Coder-Session-Token: $CODER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"transition": "delete"}')

          echo "Delete response (HTTP $HTTP_STATUS):"
          cat /tmp/delete_response.json | jq . || cat /tmp/delete_response.json

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Failed to delete workspace (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "Workspace deletion initiated: $WORKSPACE_NAME"

          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<EOF
          ## Workspace Cleaned Up

          | Key | Value |
          |-----|-------|
          | **Workspace ID** | \`$WORKSPACE_ID\` |
          | **Workspace name** | \`$WORKSPACE_NAME\` |
          | **Status** | Deletion initiated |

          <!-- agent-metadata-closed
          workspace_id: $WORKSPACE_ID
          workspace_name: $WORKSPACE_NAME
          issue: ${{ github.event.issue.number }}
          -->
          EOF
          )"
