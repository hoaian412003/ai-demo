name: Issue — Branch & Coder Workspace

on:
  issues:
    types: [opened, reopened, closed]

jobs:
  manage:
    name: Manage Workspace
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the new branch

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Derive branch name (all actions) ────────────────────────────────
      - name: Derive branch name
        id: branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '-' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-50)
          echo "name=issue/${{ github.event.issue.number }}-${SLUG}" >> "$GITHUB_OUTPUT"

      # ── 3. Create branch (opened only) ─────────────────────────────────────
      - name: Create issue branch
        if: github.event.action == 'opened'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${{ steps.branch.outputs.name }}"
          git push origin "${{ steps.branch.outputs.name }}"
          echo "Created branch: ${{ steps.branch.outputs.name }}"

      # ── 4. Resolve AI model (opened / reopened) ────────────────────────────
      - name: Resolve AI model
        if: github.event.action != 'closed'
        id: model
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        run: |
          IS_HARD=$(echo "$LABELS_JSON" \
            | jq -r '[.[].name | ascii_downcase] | any(. == "hard") | tostring')
          if [ "$IS_HARD" = "true" ]; then
            echo "value=nine/senior-coder" >> "$GITHUB_OUTPUT"
            echo "Label 'hard' detected → nine/senior-coder"
          else
            echo "value=nine/junior-coder" >> "$GITHUB_OUTPUT"
            echo "No 'hard' label → nine/junior-coder"
          fi

      # ── 5. Resolve template name → UUID (opened / reopened) ────────────────
      - name: Resolve Coder template ID
        if: github.event.action != 'closed'
        id: template
        env:
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          TEMPLATE_NAME="${{ secrets.CODER_TEMPLATE_NAME }}"

          # If the value already looks like a UUID, use it directly.
          if echo "$TEMPLATE_NAME" | grep -qE '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'; then
            echo "id=$TEMPLATE_NAME" >> "$GITHUB_OUTPUT"
            echo "Template ID (UUID passed directly): $TEMPLATE_NAME"
            exit 0
          fi

          # Otherwise look it up by name under the default organisation.
          HTTP_STATUS=$(curl -s \
            -o /tmp/template_response.json \
            -w "%{http_code}" \
            "${{ secrets.CODER_URL }}/api/v2/organizations/default/templates/$TEMPLATE_NAME" \
            -H "Coder-Session-Token: $CODER_TOKEN")

          echo "Template lookup response (HTTP $HTTP_STATUS):"
          cat /tmp/template_response.json | jq . || cat /tmp/template_response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::error::Could not resolve template '$TEMPLATE_NAME' (HTTP $HTTP_STATUS)"
            exit 1
          fi

          TEMPLATE_ID=$(jq -r '.[0].id' /tmp/template_response.json)
          echo "id=$TEMPLATE_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved template '$TEMPLATE_NAME' → $TEMPLATE_ID"

      # ── 6. Create Coder workspace (opened / reopened) ──────────────────────
      - name: Create Coder workspace
        if: github.event.action != 'closed'
        env:
          TASK_PROMPT: ${{ github.event.issue.body }}
          AI_API_KEY:  ${{ secrets.AI_API_KEY }}
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg name        "issue-${{ github.event.issue.number }}" \
            --arg template_id "${{ steps.template.outputs.id }}" \
            --arg ai_api_key  "$AI_API_KEY" \
            --arg ai_model    "${{ steps.model.outputs.value }}" \
            --arg branch      "${{ steps.branch.outputs.name }}" \
            --arg repository  "https://github.com/${{ github.repository }}" \
            --arg task_prompt "$TASK_PROMPT" \
            '{
              name: $name,
              template_id: $template_id,
              rich_parameter_values: [
                { name: "ai_api_key",      value: $ai_api_key },
                { name: "ai_model",        value: $ai_model },
                { name: "branch",          value: $branch },
                { name: "repository",      value: $repository },
                { name: "nodejs_version",  value: "22" },
                { name: "task_prompt",     value: $task_prompt }
              ]
            }')

          HTTP_STATUS=$(curl -s \
            -o /tmp/coder_response.json \
            -w "%{http_code}" \
            -X POST "${{ secrets.CODER_URL }}/api/v2/users/me/workspaces" \
            -H "Coder-Session-Token: $CODER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Coder API response (HTTP $HTTP_STATUS):"
          cat /tmp/coder_response.json | jq . || cat /tmp/coder_response.json

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Failed to create Coder workspace (HTTP $HTTP_STATUS)"
            exit 1
          fi

          WORKSPACE_NAME=$(jq -r '.name' /tmp/coder_response.json)
          WORKSPACE_ID=$(jq -r '.id'   /tmp/coder_response.json)
          echo "Workspace created: $WORKSPACE_NAME ($WORKSPACE_ID)"

      # ── 7. Delete Coder workspace (closed) ─────────────────────────────────
      - name: Delete Coder workspace
        if: github.event.action == 'closed'
        env:
          CODER_TOKEN: ${{ secrets.CODER_TOKEN }}
        run: |
          WORKSPACE_NAME="issue-${{ github.event.issue.number }}"

          # Look up workspace by name.
          HTTP_STATUS=$(curl -s \
            -o /tmp/ws_list.json \
            -w "%{http_code}" \
            "${{ secrets.CODER_URL }}/api/v2/workspaces?owner=me&name=$WORKSPACE_NAME" \
            -H "Coder-Session-Token: $CODER_TOKEN")

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::warning::Could not list workspaces (HTTP $HTTP_STATUS) — skipping delete"
            cat /tmp/ws_list.json
            exit 0
          fi

          WORKSPACE_ID=$(jq -r '.workspaces[0].id // empty' /tmp/ws_list.json)

          if [ -z "$WORKSPACE_ID" ]; then
            echo "No workspace named '$WORKSPACE_NAME' found — nothing to delete."
            exit 0
          fi

          echo "Deleting workspace $WORKSPACE_NAME ($WORKSPACE_ID)..."

          HTTP_STATUS=$(curl -s \
            -o /tmp/delete_response.json \
            -w "%{http_code}" \
            -X POST "${{ secrets.CODER_URL }}/api/v2/workspaces/$WORKSPACE_ID/builds" \
            -H "Coder-Session-Token: $CODER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"transition": "delete"}')

          echo "Delete response (HTTP $HTTP_STATUS):"
          cat /tmp/delete_response.json | jq . || cat /tmp/delete_response.json

          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "::error::Failed to delete workspace (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "Workspace deletion initiated: $WORKSPACE_NAME"
